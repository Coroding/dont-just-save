name: Deploy interactive demo to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'dont-just-save-interactive-demo/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate static demo files
        run: |
          test -f dont-just-save-interactive-demo/index.html
          test -f dont-just-save-interactive-demo/styles.css
          test -f dont-just-save-interactive-demo/app.js
          echo "Static demo files found."

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dont-just-save-interactive-demo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
